<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habib Video Downloader</title>
    <!-- Tailwind CSS (For Modern & Premium UI) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            min-height: 100vh;
        }
        .glass-box {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .loader-spin {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 0.85s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-gray-200 antialiased">

    <div class="w-full max-w-lg p-6 sm:p-8 rounded-3xl glass-box shadow-2xl text-center">
        <!-- Brand Header -->
        <div class="flex justify-center items-center gap-3 mb-4">
            <div class="p-3 bg-blue-600/15 text-blue-500 rounded-2xl">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
            </div>
            <h1 class="text-2xl sm:text-3xl font-black tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                Habib Downloader
            </h1>
        </div>
        <p class="text-sm text-gray-400 mb-8">Download Facebook & Instagram videos instantly via main API endpoint.</p>

        <!-- Input Wrapper -->
        <div class="space-y-3 mb-6">
            <input type="text" id="videoUrl" placeholder="Paste full Facebook or Instagram link here..." 
                   class="w-full px-4 py-3.5 bg-gray-900/60 border border-gray-800 rounded-xl focus:outline-none focus:border-blue-500 text-white placeholder-gray-500 transition-all text-sm">
            <button onclick="fetchVideoData()" 
                    class="w-full bg-blue-600 hover:bg-blue-500 active:scale-[0.99] text-white font-semibold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-600/20 cursor-pointer">
                Get Download Links
            </button>
        </div>

        <!-- Dynamic Loader -->
        <div id="loader" class="hidden flex flex-col items-center justify-center my-8 gap-3">
            <div class="loader-spin"></div>
            <p class="text-blue-400 text-sm font-medium animate-pulse">Connecting to main API server...</p>
        </div>

        <!-- Error Message Notification -->
        <div id="errorMessage" class="hidden p-4 mb-4 text-sm bg-red-950/40 border border-red-500/30 text-red-400 rounded-xl text-left"></div>

        <!-- Output Result Panel -->
        <div id="resultBox" class="hidden mt-6 text-left bg-gray-900/50 p-5 rounded-xl border border-gray-800/80">
            <div class="flex items-center gap-2 mb-3 pb-2 border-b border-gray-800">
                <span class="flex h-2 w-2 relative">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider">Video Extracted</h3>
            </div>
            
            <p id="videoAuthor" class="text-xs font-mono text-gray-400 mb-4 break-all"></p>
            
            <!-- Download Links Container -->
            <div id="linksContainer" class="flex flex-col gap-2.5">
                <!-- Javascript will inject links here -->
            </div>
        </div>
    </div>

    <!-- API Connection Logic -->
    <script>
        async function fetchVideoData() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('errorMessage');
            const resultBox = document.getElementById('resultBox');
            const linksContainer = document.getElementById('linksContainer');
            const authorText = document.getElementById('videoAuthor');

            // Reset UI components
            errorBox.classList.add('hidden');
            resultBox.classList.add('hidden');
            linksContainer.innerHTML = '';
            
            if (!urlInput) {
                showError("Please paste a social media video link first!");
                return;
            }

            loader.classList.remove('hidden');

            try {
                // আপনার নির্দিষ্ট করা মেইন লাইভ API এন্ডপয়েন্ট ব্যবহার করা হয়েছে
                const response = await fetch('https://habib-downloader.vercel.app/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const resData = await response.json();
                loader.classList.add('hidden');

                if (resData.success) {
                    const payload = resData.data;
                    authorText.innerText = 'Source/Owner: ' + (payload.author || payload.developer || 'Public Media Post');
                    
                    // ভিডিও রেজোলিউশন ও লিংক অবজেক্ট অ্যারে চেক করা
                    const videoList = payload.videos || payload.data || [];

                    if (videoList.length === 0) {
                        showError("Could not retrieve clean download stream. Ensure the post is public and use full video links.");
                        return;
                    }

                    // প্রতিটি উপলব্ধ রেজোলিউশনের জন্য ডাউনলোড বাটন তৈরি
                    videoList.forEach((video, index) => {
                        if (video.url) {
                            const downloadBtn = document.createElement('a');
                            downloadBtn.href = video.url;
                            downloadBtn.target = '_blank';
                            downloadBtn.className = "flex justify-between items-center bg-gray-800 hover:bg-gray-700/80 text-white font-medium py-3 px-4 rounded-xl border border-gray-700/50 transition-all group shadow-sm";
                            
                            const resolutionQuality = video.resolution ? video.resolution : 'Download Link ' + (index + 1);
                            downloadBtn.innerHTML = `
                                <span class="text-sm">Download Video (${resolutionQuality.toUpperCase()})</span>
                                <svg class="w-4 h-4 text-gray-400 group-hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                                </svg>
                            `;
                            linksContainer.appendChild(downloadBtn);
                        }
                    });

                    resultBox.classList.remove('hidden');
                } else {
                    showError(resData.message || "Failed to process URL. Make sure the link is correct and public.");
                }

            } catch (err) {
                loader.classList.add('hidden');
                showError("Unable to connect to the main Vercel API. Check if your Vercel server status is active.");
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorMessage');
            errorBox.innerText = message;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
