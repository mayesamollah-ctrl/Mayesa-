<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayesa Downloader</title>
    <style>
        :root {
            /* image.png এর থিম অনুযায়ী নিয়ন কালার প্যালেট */
            --primary-glow: #00f0ff; /* সায়ান গ্লো */
            --secondary-glow: #bd00ff; /* মেজেন্টা/পার্পল গ্লো */
            --accent-blue: #0066ff; /* নিয়ন ব্লু */
            --bg-dark: #06080f; /* ডিপ ডার্ক ব্যাকগ্রাউন্ড */
            --card-bg: rgba(11, 15, 28, 0.75); /* গ্লাস মরফিজম ইফেক্ট */
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            /* image.png এর মাল্টি-কালার নিয়ন লাইটের মতো ব্যাকগ্রাউন্ড গ্রেডিয়েন্ট */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 240, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(189, 0, 255, 0.08) 0%, transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: var(--text-main);
            position: relative;
        }

        /* Ambient Outer Light (image.png স্টাইল) */
        body::before {
            content: "";
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.1) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        /* Premium Tech Grid Container */
        .container {
            position: relative;
            width: 92%;
            max-width: 440px;
            padding: 35px 25px;
            border-radius: 16px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 30px rgba(0, 240, 255, 0.05);
            z-index: 10;
        }

        /* Cyber Corner Indicators */
        .container::before, .container::after {
            content: "";
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2px solid var(--primary-glow);
        }
        .container::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .container::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .terminal-text {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 25px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            text-align: center;
            background: linear-gradient(90deg, #00f0ff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        /* Input Styling */
        input {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            outline: none;
            border-radius: 10px;
            background: rgba(4, 6, 12, 0.8);
            color: #fff;
            font-size: 14px;
            margin-bottom: 18px;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
            background: rgba(0, 240, 255, 0.02);
        }

        input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Action Solid Button */
        .btn-cyber {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, var(--accent-blue), var(--secondary-glow));
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 102, 255, 0.3);
        }

        .btn-cyber:hover {
            opacity: 0.95;
            box-shadow: 0 0 25px rgba(189, 0, 255, 0.5);
            transform: translateY(-1px);
        }

        /* Output Response Display */
        #result {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-muted);
        }

        video {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
        }

        .download-btn {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            padding: 14px;
            border-radius: 10px;
            color: #fff;
            background: linear-gradient(90deg, #00f0ff, #0066ff);
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 240, 255, 0.25);
        }

        .download-btn:hover {
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
        }

        /* Operator Identity Footer Card */
        .operator-profile {
            margin-top: 30px;
            border-top: 1px solid rgba(0, 240, 255, 0.15);
            padding-top: 20px;
            text-align: left;
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            border: 1px solid var(--primary-glow);
            object-fit: cover;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .profile-info h4 {
            color: var(--text-main);
            margin-bottom: 2px;
            font-size: 16px;
            font-weight: 600;
        }

        .profile-info p {
            color: var(--primary-glow);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* Action Layout Buttons */
        .profile-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-contact {
            flex: 1;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.2s;
        }

        .btn-contact:hover {
            background: rgba(0, 240, 255, 0.08);
            border-color: var(--primary-glow);
            color: #fff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        /* Bottom Love Credit Lines */
        .credit-footer {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            font-weight: 500;
            animation: pulse 2.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Dashboard Core Branding Header -->
        <div class="terminal-text">Mayesa Downloader 📥</div>
        
        <!-- Media Extraction Module -->
        <input type="text" id="videoUrl" placeholder="Enter Video URL Link Here...">
        <button class="btn-cyber" onclick="downloadVideo()">Extract Video</button>

        <!-- Ajax Response Loading Output -->
        <div id="result"></div>

        <!-- Infrastructure Profile Area -->
        <div class="operator-profile">
            <div class="profile-header">
                <img class="profile-img" src="https://files.catbox.moe/wo35v2.jpg" alt="Mayesa Mollah">
                <div class="profile-info">
                    <h4>Owner: Mayesa</h4>
                    <p>// System Root Verified</p>
                </div>
            </div>
            
            <!-- Contact Interface Handlers -->
            <div class="profile-buttons">
                <a class="btn-contact" href="https://www.facebook.com/share/1BBoYP1Ctq/" target="_blank">Facebook</a>
                <a class="btn-contact" href="https://www.instagram.com/missmayesa?igsh=MTJhcmgzOTB3am03Yg==" target="_blank">Instagram</a>
            </div>

            <!-- Signature Watermark -->
            <div class="credit-footer">
                Created by 💝 Mayesa Mollah
            </div>
        </div>
    </div>

    <script>
        // Data Capture & Integration Loop 
        async function downloadVideo() {
            const url = document.getElementById("videoUrl").value.trim();
            const result = document.getElementById("result");
            if(!url) return alert("Please enter a valid URL");
            
            result.innerHTML = "<span style='color:var(--primary-glow);'>⏳ Extracting media pipeline payload...</span>";
            try {
                const res = await fetch(`https://mahabub-apis.fun/mahabub/dl?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const video = data.hd || data.sd;
                if(!video) return result.innerHTML = "<span style='color:#ef4444;'>❌ Media source link structure not found.</span>";
                
                result.innerHTML = `
                    <video controls src="${video}"></video>
                    <a class="download-btn" href="${video}" download target="_blank">Download Asset Now</a>
                `;
            } catch(e) { 
                result.innerHTML = "<span style='color:#ef4444;'>❌ Error resolving API target cluster.</span>"; 
            }
        }
    </script>
</body>
</html>
