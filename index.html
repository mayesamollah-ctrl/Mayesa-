<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habib Video Downloader</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #6366f1;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4 text-white">

    <div class="w-full max-w-xl p-8 rounded-3xl glass-card shadow-2xl text-center">
        <div class="flex justify-center items-center gap-3 mb-4">
            <svg class="w-10 h-10 text-indigo-500 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            <h1 class="text-3xl font-black tracking-wide bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                Habib Downloader
            </h1>
        </div>
        <p class="text-gray-400 mb-8 text-sm">Download Facebook & Instagram videos instantly using your live Render API.</p>

        <div class="flex flex-col sm:flex-row gap-3 mb-6">
            <input type="text" id="videoUrl" placeholder="Paste Facebook or Instagram link here..." 
                   class="flex-1 px-4 py-3.5 bg-slate-900/60 border border-gray-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white placeholder-gray-500 transition-all text-sm sm:text-base">
            <button onclick="startDownloading()" 
                    class="bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white font-semibold px-6 py-3.5 rounded-xl transition-all cursor-pointer shadow-lg shadow-indigo-600/30 text-sm sm:text-base">
                Fetch Video
            </button>
        </div>

        <div id="loader" class="hidden flex-col items-center justify-center my-6 gap-3">
            <div class="spinner"></div>
            <p class="text-indigo-400 font-medium text-sm">Connecting to Render API & extracting links...</p>
            <span class="text-xs text-gray-500">(Render free server may take 30-50s to wake up for the first request)</span>
        </div>

        <div id="errorMessage" class="hidden p-4 mb-4 text-sm bg-red-900/30 border border-red-500/40 text-red-400 rounded-xl text-left"></div>

        <div id="resultBox" class="hidden mt-6 text-left bg-slate-900/70 p-5 rounded-xl border border-gray-800 transition-all">
            <h3 class="text-lg font-bold text-cyan-400 mb-2 border-b border-gray-800 pb-2 flex items-center gap-2">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Video Links Ready!
            </h3>
            <p id="videoAuthor" class="text-xs text-gray-400 mb-4 font-mono uppercase tracking-wider"></p>
            
            <div id="linksContainer" class="flex flex-col gap-3">
                </div>
        </div>
    </div>

    <script>
        async function startDownloading() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const loader = document.getElementById('loader');
            const errorBox = document.getElementById('errorMessage');
            const resultBox = document.getElementById('resultBox');
            const linksContainer = document.getElementById('linksContainer');
            const authorText = document.getElementById('videoAuthor');

            // Reset UI states on new request
            errorBox.classList.add('hidden');
            resultBox.classList.add('hidden');
            linksContainer.innerHTML = '';
            
            if (!urlInput) {
                showError("Please paste a valid video URL first!");
                return;
            }

            // Show loading animation
            loader.classList.remove('hidden');

            try {
                // আপনার লাইভ রেন্ডার এপিআই-তে হিট করা হচ্ছে
                const response = await fetch('https://habib-downloader.onrender.com/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                const resData = await response.json();
                loader.classList.add('hidden'); // Hide loader

                if (resData.success) {
                    const payload = resData.data;
                    authorText.innerText = 'Source/Author: ' + (payload.author || payload.developer || 'Social Media');
                    
                    // মডিউলের রেসপন্স ফরম্যাট অনুযায়ী ভিডিওর লিস্ট চেক করা
                    const videoList = payload.videos || payload.data || [];

                    if (videoList.length === 0) {
                        showError("No download link could be extracted from this URL. The video might be private or deleted.");
                        return;
                    }

                    // ডাইনামিকালি ডাউনলোড বাটন তৈরি করা
                    videoList.forEach((video, index) => {
                        if (video.url) {
                            const downloadBtn = document.createElement('a');
                            downloadBtn.href = video.url;
                            downloadBtn.target = '_blank';
                            // Beautiful modern gradient button for download
                            downloadBtn.className = "flex justify-between items-center bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 text-white font-semibold py-3.5 px-5 rounded-xl transition-all shadow-md transform hover:-translate-y-0.5 text-sm";
                            
                            const resolutionLabel = video.resolution ? video.resolution : 'Download File ' + (index + 1);
                            downloadBtn.innerHTML = `
                                <span>Download Video (${resolutionLabel.toUpperCase()})</span>
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                                </svg>
                            `;
                            linksContainer.appendChild(downloadBtn);
                        }
                    });

                    // শো রেজাল্ট কার্ড
                    resultBox.classList.remove('hidden');
                } else {
                    showError(resData.message || "Failed to parse video. Ensure the video is public.");
                }

            } catch (err) {
                loader.classList.add('hidden');
                showError("Unable to connect to your Render server. (Note: Server takes up to 1 minute to wake up if it was inactive). Please try again in a few moments!");
            }
        }

        function showError(message) {
            const errorBox = document.getElementById('errorMessage');
            errorBox.innerText = message;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
