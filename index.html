<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Video Downloader</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>

    <h2>সোশ্যাল মিডিয়া ভিডিও ডাউনলোড করুন</h2>
    <input type="text" id="videoUrl" placeholder="ভিডিওর লিংকটি এখানে দিন">
    <button onclick="downloadVideo()">ডাউনলোড লিঙ্ক আনুন</button>

    <div id="result"></div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('videoUrl').value;
            const resultDiv = document.getElementById('result');
            
            if (!url) return alert("দয়া করে একটি লিংক দিন!");

            resultDiv.innerHTML = "প্রসেস হচ্ছে... দয়া করে অপেক্ষা করুন।";

            try {
                // নতুন API কনফিগ লিংকটি এখানে আপডেট করা হয়েছে
                const response = await fetch("https://raw.githubusercontent.com/Mostakim0978/D1PT0/refs/heads/main/baseApiUrl.json");
                const config = await response.json();
                
                // আপনার নতুন JSON ফাইলের কী (key) অনুযায়ী এখানে পরিবর্তন করতে হতে পারে
                // আমি ধরে নিচ্ছি আপনার নতুন JSON ফাইলেও একই স্ট্রাকচার আছে
                const base = config.api; 

                // API কল
                const apiRes = await fetch(`${base}/api/download?url=${encodeURIComponent(url)}`);
                const data = await apiRes.json();

                if (data.result) {
                    resultDiv.innerHTML = `<p>ভিডিওটি এখান থেকে ডাউনলোড করুন:</p>
                                          <a href="${data.result}" target="_blank">ডাউনলোড করুন</a>`;
                } else {
                    resultDiv.innerHTML = "দুঃখিত, ভিডিওটি পাওয়া যায়নি।";
                }
            } catch (err) {
                resultDiv.innerHTML = "সার্ভার এরর, পুনরায় চেষ্টা করুন।";
            }
        }
    </script>
</body>
</html>
