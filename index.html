<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habib Downloader | Cyberpunk Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #050111; font-family: sans-serif; color: #e0d9f5; }

        body::before {
            content: ''; position: fixed; top: -20px; left: -20px; width: calc(100% + 40px); height: calc(100% + 40px);
            background: linear-gradient(to bottom, #050111, #1a0136, #050111), radial-gradient(circle, rgba(111,0,255,0.2), transparent 70%);
            z-index: 0; animation: ambientShift 25s ease-in-out infinite alternate;
        }
        @keyframes ambientShift {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            100% { transform: translate3d(-5px, 10px, 0) scale(0.99); }
        }

        body::after {
            content: ''; position: fixed; bottom: -70%; left: -50%; width: 200%; height: 200%;
            background-image: linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px; transform: perspective(400px) rotateX(65deg); z-index: 1; animation: gridMove 50s linear infinite;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 1000px; } }

        .container {
            position: absolute; top: 50%; left: 50%; z-index: 2; text-align: center;
            background: rgba(15, 2, 35, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 30px 22px; border: 1px solid rgba(0, 255, 255, 0.2); border-radius: 15px;
            width: 90%; max-width: 440px; will-change: transform; transform: translate3d(-50%, -50%, 0);
            animation: float 4s ease-in-out infinite alternate;
        }
        @keyframes float {
            0% { transform: translate3d(-50%, -48%, 0); box-shadow: 0 5px 20px rgba(111,0,255,0.2); }
            100% { transform: translate3d(-50%, -52%, 0); box-shadow: 0 15px 35px rgba(0,255,255,0.25); }
        }

        .terminal-text { 
            font-family: 'Orbitron', sans-serif; font-size: 1.6rem; font-weight: 900; margin-bottom: 25px; 
            background: linear-gradient(135deg, #00ffff, #8b5cf6, #6f00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 2px; animation: glow 3s infinite alternate;
        }
        @keyframes glow { 0% { filter: drop-shadow(0 0 4px rgba(0,255,255,0.5)); } 100% { filter: drop-shadow(0 0 10px rgba(111,0,255,0.6)); } }
        
        input {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.6); border: 1px solid #6f00ff; border-radius: 8px;
            color: #fff; margin-bottom: 18px; text-align: center; outline: none; font-size: 0.95rem; transition: 0.3s;
        }
        input:focus { border-color: #8b5cf6; box-shadow: 0 0 12px rgba(0,255,255,0.4); }

        .btn-cyber {
            background: linear-gradient(135deg, #6f00ff, #007bff); color: #fff; border: none; border-radius: 8px;
            padding: 14px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1.05rem; text-transform: uppercase; transition: 0.3s;
        }
        .btn-cyber:hover { box-shadow: 0 0 15px rgba(111,0,255,0.6); }
        
        #result { margin-top: 20px; font-size: 0.95rem; color: #0ff; }
        video { width: 100%; margin-top: 15px; border: 2px solid #6f00ff; border-radius: 8px; }
        
        .download-btn { 
            display: block; margin-top: 15px; padding: 12px; background: linear-gradient(135deg, #00ffff, #8b5cf6);
            color: #050111; font-weight: bold; border-radius: 8px; text-decoration: none; text-transform: uppercase; width: 100%; border: none;
        }

        .operator-profile { margin-top: 25px; padding: 15px; border-top: 1px solid rgba(0,255,255,0.2); background: rgba(0,0,0,0.4); border-radius: 8px; text-align: left; }
        .profile-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .profile-img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid #6f00ff; object-fit: cover; }
        .profile-info h4 { color: #fff; font-size: 1.05rem; }
        .profile-info p { color: #6f00ff; font-size: 0.8rem; font-weight: bold; }
        
        .social-grid { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-social { flex: 1; text-align: center; padding: 9px; background: rgba(111,0,255,0.1); color: #e0d9f5; border: 1px solid #6f00ff; border-radius: 6px; text-decoration: none; font-size: 0.85rem; font-weight: bold; }
        .btn-social:hover { background: rgba(111,0,255,0.3); color: #fff; }

        .credit-footer { text-align: center; font-size: 0.85rem; color: #fff; font-weight: bold; margin-top: 5px; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="terminal-text">Habib Downloader</div>
        
        <input type="text" id="videoUrl" placeholder="Paste Video URL Here...">
        <button class="btn-cyber" onclick="downloadVideo()">Download Now</button>

        <div id="result"></div>

        <div class="operator-profile">
            <div class="profile-header">
                <img class="profile-img" src="https://files.catbox.moe/473ayg.jpg" alt="Habib">
                <div class="profile-info">
                    <h4>Owner: HABIB</h4>
                    <p>STATUS: ONLINE</p>
                </div>
            </div>
            
            <div class="social-grid">
                <a href="https://www.facebook.com/share/1DAaMYGeJt/" class="btn-social" target="_blank"><i class="fa-brands fa-facebook-f"></i> Facebook</a>
                <a href="https://www.instagram.com/sk_habib_687?igsh=em5yZzF2NnJ4NGo3" class="btn-social" target="_blank"><i class="fa-brands fa-instagram"></i> Instagram</a>
            </div>

            <div class="credit-footer">Created by 💝 Sk Habib</div>
        </div>
    </div>

    <script>
        async function triggerDirectDownload(videoUrl) {
            const btn = document.querySelector('.download-btn');
            const oldText = btn.innerHTML;
            btn.innerHTML = "⏳ Downloading...";
            btn.style.pointerEvents = "none";

            try {
                const response = await fetch(videoUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = `Habib_${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                btn.innerHTML = "✅ Complete";
            } catch {
                window.open(videoUrl, '_blank');
                btn.innerHTML = "⚡ Opening...";
            } finally {
                setTimeout(() => { btn.innerHTML = oldText; btn.style.pointerEvents = "auto"; }, 2500);
            }
        }

        async function downloadVideo() {
            const url = document.getElementById("videoUrl").value.trim();
            const result = document.getElementById("result");
            if(!url) return alert("Please enter a URL");
            
            result.innerHTML = "📡 Extracting...";
            try {
                const res = await fetch(`https://noobs-api.top/dipto?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                const video = data.hd || data.sd || data.video || data.url;
                
                if(!video) return result.innerHTML = "❌ NOT FOUND.";
                result.innerHTML = `<video controls src="${video}"></video><button class="download-btn" onclick="triggerDirectDownload('${video}')">Download</button>`;
            } catch { 
                result.innerHTML = "❌ FAILED."; 
            }
        }
    </script>
</body>
</html>
