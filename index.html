<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO Downloader</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    
    :root {
        --bg1: #667eea; --bg2: #764ba2; --bg3: #f093fb;
        --card: rgba(255, 255, 255, 0.12); --text: white; --border: rgba(255,255,255,0.25);
        --input: rgba(255,255,255,0.18);
    }
    body.dark {
        --bg1: #0f0f0f; --bg2: #1a1a1a; --bg3: #2a2a2a;
        --card: rgba(0, 0, 0, 0.4); --text: #e0e0e0; --border: rgba(255,255,255,0.1);
        --input: rgba(0,0,0,0.3);
    }

    body {
        min-height: 100vh;
        background: linear-gradient(135deg, var(--bg1)
        0%, var(--bg2) 50%, var(--bg3) 100%);
        display: flex; justify-content: center; align-items: center; padding: 20px;
        color: var(--text); transition: 0.4s;
    }
    
    .theme-btn {
        position: absolute; top: 20px; right: 20px;
        background: rgba(255,255,255,0.2); border: none; border-radius: 50%;
        width: 45px; height: 45px; font-size: 20px; cursor: pointer;
        backdrop-filter: blur(10px); transition: 0.3s; color: white;
    }
    .theme-btn:hover { transform: rotate(180deg) scale(1.1); }

    .card {
        background: var(--card); backdrop-filter: blur(25px);
        border: 1px solid var(--border); padding: 35px; width: 100%;
        max-width: 440px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.4);
    }
    
    .logo { text-align: center; font-size: 28px; font-weight: 700; margin-bottom: 5px; }
    .logo span { color: #ffd700; }
    .subtitle { text-align: center; font-size: 13px; opacity: 0.85; margin-bottom: 10px; }
    .status { text-align: center; font-size: 11px; color: #7bed9f; margin-bottom: 20px; }
    
    input {
        width: 100%; padding: 15px 18px; background: var(--input);
        border: 1.5px solid var(--border); border-radius: 15px; color: var(--text);
        font-size: 14px; outline: none; margin-bottom: 18px;
    }
    input::placeholder { color: var(--text); opacity: 0.6; }
    
    .btn {
        width: 100%; padding: 15px; background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
        background-size: 200% auto; border: none; border-radius: 15px; color: white;
        font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.4s;
    }
    .btn:hover { background-position: right center; transform: translateY(-3px); }
    
    .profile {
        display: flex; align-items: center; gap: 15px; margin: 25px 0; padding: 18px;
        background: var(--input); border-radius: 15px; border: 1px solid var(--border);
    }
    .profile img { 
        width: 55px; height: 55px; border-radius: 50%; 
        border: 3px solid #ffd700; object-fit: cover;
        box-shadow: 0 0 15px rgba(255,215,0,0.5);
    }
    .profile b { font-size: 15px; }
    .profile p { font-size: 12px; opacity: 0.8; }
    
    .social { display: flex; gap: 12px; margin-bottom: 18px; }
    .social a {
        flex: 1; padding: 12px; text-align: center; border-radius: 12px;
        background: var(--input); color: var(--text); text-decoration: none;
        font-size: 14px; font-weight: 600; transition: 0.3s; border: 1px solid var(--border);
    }
    .social a:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .footer { text-align: center; font-size: 12px; opacity: 0.7; margin-top: 10px; }
</style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>

<div class="card">
    <div class="logo"> <span>PRO</span> DOWNLOADER ⬇️</div>
    <p class="subtitle">Facebook • Instagram • YouTube • TikTok</p>
    <p class="status">● System online</p>
    
    <input type="text" id="videoUrl" placeholder="Paste Video Link Here...">
    <button class="btn" onclick="downloadVideo()">🚀 GET VIDEO NOW</button>
    
    <div class="profile">
        <img src="https://i.imgur.com/zWTJetB.jpeg" alt="Sk Habibulla">
        <div>
            <p> Developer | </p>
            <b>Sk Habibulla</b>
             <p> Contact to owner 𝄞  </p>
        </div>
    </div>
    
    <div class="social">
        <a href="https://www.facebook.com/share/1EegedjFZh/" target="_blank">📘 Facebook</a>
        <a href="https://www.instagram.com/sk_habib_687?igsh=em5yZzF2NnJ4NGo3" target="_blank">📸 Instagram</a>
    </div>
    
    <div class="footer">
        Made with ❤️ by Sk Habibulla 
    </div>
</div>

<script>
const API_URL = "//https://mahabub-apis.fun/mahabub/dl?url=";
let config = {};

window.onload = () => {
    fetch(API_URL).then(res => res.json()).then(data => config = data);
    document.body.classList.add('dark'); // Default Dark
    document.getElementById('themeBtn').innerText = '☀️';
}

function toggleTheme() {
    document.body.classList.toggle('dark');
    const btn = document.getElementById('themeBtn');
    btn.innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
}

function downloadVideo() {
    const url = document.getElementById('videoUrl').value;
    if(url === "") return alert("⚠️ আগে Link টা paste করো!");
    alert("✅ API: " + config.baseApi + "\n📹 Video: " + url);
}
</script>

</body>
</html>
