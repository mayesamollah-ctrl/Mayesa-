<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Downloader | CEO HABIB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
    
    :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text-main: #ffffff;
        --text-sub: #94a3b8;
        --input-bg: #0f172a;
        --input-border: #334155;
        --primary-color: #38bdf8;
    }

    .light-mode {
        --bg-color: #f8fafc;
        --card-bg: rgba(255, 255, 255, 0.9);
        --text-main: #1e293b;
        --text-sub: #64748b;
        --input-bg: #ffffff;
        --input-border: #cbd5e1;
        --primary-color: #2563eb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
    
    body {
        min-height: 100vh;
        background: var(--bg-color);
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .card {
        background: var(--card-bg);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 40px;
        width: 100%;
        max-width: 400px;
        border-radius: 30px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        text-align: center;
        position: relative;
    }

    .theme-toggle { position: absolute; top: 20px; right: 20px; cursor: pointer; color: var(--text-main); font-size: 20px; }
    
    /* নতুন প্রোফাইল ছবি স্টাইল */
    .profile-img-container {
        width: 110px;
        height: 110px;
        margin: -60px auto 20px auto; /* কার্ডের উপরে ভাসমান রাখার জন্য */
        position: relative;
    }
    
    .profile-img-container img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 4px solid #fff;
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.6); /* গ্লো ইফেক্ট */
        object-fit: cover;
    }
    
    .logo { color: var(--text-main); font-size: 26px; font-weight: 800; margin-bottom: 10px; }
    .logo span { color: var(--primary-color); }
    
    .subtitle { color: var(--text-sub); font-size: 14px; margin-bottom: 25px; }

    input {
        width: 100%;
        padding: 16px 20px;
        background: var(--input-bg);
        border: 2px solid var(--input-border);
        border-radius: 16px;
        color: var(--text-main);
        font-size: 15px;
        margin-bottom: 20px;
        outline: none;
    }
    input:focus { border-color: var(--primary-color); }

    .btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, #38bdf8, #818cf8);
        border: none;
        border-radius: 16px;
        color: white;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 25px;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-2px); }

    .social-links { display: flex; gap: 10px; }
    .social-links a {
        flex: 1;
        padding: 12px;
        background: rgba(128,128,128,0.1);
        color: var(--text-main);
        text-decoration: none;
        border-radius: 12px;
        font-size: 14px;
        border: 1px solid var(--input-border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }
    .social-links a:hover { background: rgba(128,128,128,0.2); }
</style>
</head>
<body>

<div class="card">
    <div class="theme-toggle" onclick="document.body.classList.toggle('light-mode')">
        <i class="fas fa-adjust"></i>
    </div>
    
    <!-- নতুন প্রোফাইল ছবি -->
    <div class="profile-img-container">
        <img src="https://i.imgur.com/zWTJetB.jpeg" alt="CEO HABIB">
    </div>
    
    <div class="logo">CEO <span>HABIB</span></div>
    <p class="subtitle">Fast & Reliable Video Downloader</p>
    
    <input type="text" id="videoUrl" placeholder="Paste video link here...">
    <button class="btn" onclick="downloadVideo()">
        <i class="fas fa-download"></i> Download Now
    </button>
    
    <div class="social-links">
        <a href="https://www.facebook.com/share/1EegedjFZh/" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
        <a href="https://www.instagram.com/sk_habib_687?igsh=em5yZzF2NnJ4NGo3" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
    </div>
</div>

<script>
const API_URL = "https://raw.githubusercontent.com/mahmudx7/exe/main/baseApiUrl.json";
let config = {};

window.onload = function() {
    fetch(API_URL)
    .then(res => res.json())
    .then(data => { config = data; })
    .catch(err => console.log("API Error"));
}

function downloadVideo() {
    const url = document.getElementById('videoUrl').value;
    if(url === "") {
        alert("Please paste a link first!");
        return;
    }
    // এখানে API কল হবে (আপনার আগের কোড অনুযায়ী)
    alert("API: " + config.baseApi + "\nProcessing: " + url);
}
</script>

</body>
</html>
